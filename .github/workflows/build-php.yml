name: Build PHP 8.2 for PocketMine-MP 5

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "php-**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux x86_64 (PM 5)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make autoconf automake libtool libtool-bin m4 wget \
            libc-bin gzip bzip2 bison g++ git re2c pkg-config cmake

      - name: Setup cache for downloads
        id: cache
        uses: actions/cache@v4
        with:
          path: download_cache
          key: php-compile-cache-${{ hashFiles('compile.sh') }}
          restore-keys: php-compile-cache-

      - name: Make script executable
        run: chmod +x compile.sh

      - name: Compile PHP 8.2.13
        run: |
          set -ex
          ./compile.sh -j 4 -P 5 -c ./download_cache -D
        shell: bash

      - name: Create tarballs
        run: |
          tar -czf PHP-Linux-x86_64-PM5.tar.gz bin/
          tar -czf PHP-Linux-x86_64-PM5-debugging-symbols.tar.gz bin-debug/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Linux-PM5
          path: |
            PHP-Linux-x86_64-PM5.tar.gz
            PHP-Linux-x86_64-PM5-debugging-symbols.tar.gz
            install.log
          retention-days: 90

      - name: Backup workspace on failure
        if: failure()
        run: tar -czf workspace.tar.gz install_data 2>/dev/null || true

      - name: Upload workspace backup
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Linux-workspace-PM5
          path: workspace.tar.gz
          retention-days: 30
