name: Build PHP 8.2 for PocketMine-MP 5

on:
  push:
    branches: "**"
    tags-ignore: "php-**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux x86_64 (PM 5)
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - name: Install tools and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make autoconf automake libtool libtool-bin m4 wget libc-bin gzip bzip2 bison g++ git re2c pkg-config cmake

      - name: Prepare compile.sh download cache
        id: download-cache
        uses: actions/cache@v4
        with:
          path: ./download_cache
          key: compile-sh-cache-pm5-${{ hashFiles('./compile.sh') }}
          restore-keys: compile-sh-cache-pm5-

      - name: Compile PHP
        run: |
          set -ex
          trap "exit 1" ERR
          ./compile.sh -j 4 -P 5 -c ./download_cache -D

      - name: Create tarball
        run: |
          tar -czf ./PHP-Linux-x86_64-PM5.tar.gz bin
          tar -czf ./PHP-Linux-x86_64-PM5-debugging-symbols.tar.gz bin-debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Linux-PM5
          path: |
            ./PHP-Linux-x86_64-PM5*.tar.gz
            install.log
            compile.sh
          if-no-files-found: error

      - name: Prepare workspace for upload
        if: failure()
        run: tar -czf workspace.tar.gz install_data

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Linux-workspace-PM5
          path: |
            workspace.tar.gz
          if-no-files-found: error

  publish:
    name: Publish binaries
    needs: [linux]
    runs-on: ubuntu-20.04
    if: ${{ startsWith(github.ref_name, 'php/') && github.ref_type == 'branch' && !contains(github.event.head_commit.message, '[no release]') }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Set version information
        id: version
        run: |
          echo PHP_VERSION=$(echo ${{ github.ref_name }} | cut -d / -f2) >> $GITHUB_OUTPUT
          
      - name: Update latest tag target
        run: |
          git tag -f php-${{ steps.version.outputs.PHP_VERSION }}-latest
          git push -f origin php-${{ steps.version.outputs.PHP_VERSION }}-latest

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}

      - name: Generate release notes
        run: |
          echo "# PHP ${{ steps.version.outputs.PHP_VERSION }} for PocketMine-MP 5" > changelog.md
          echo "" >> changelog.md
          echo "**Linux x86_64** binary with all required extensions." >> changelog.md
          echo "" >> changelog.md
          echo "## Included Extensions:" >> changelog.md
          echo "- pmmpthread 6.0.12" >> changelog.md
          echo "- yaml 2.2.3" >> changelog.md
          echo "- chunkutils2 0.3.5" >> changelog.md
          echo "- leveldb 0.2.1" >> changelog.md
          echo "- igbinary 3.2.15" >> changelog.md
          echo "- xxhash 0.2.0" >> changelog.md
          echo "- libdeflate 0.2.1" >> changelog.md
          echo "- morton 0.1.2" >> changelog.md
          echo "- encoding 0.2.3" >> changelog.md
          echo "- recursionguard 0.1.0" >> changelog.md
          echo "- crypto 0.3.2" >> changelog.md
          echo "- arraydebug 0.2.0" >> changelog.md
          echo "- xdebug 3.3.0 (optional, disabled by default)" >> changelog.md
          echo "" >> changelog.md
          echo "**Last updated**: $(date -u +'%Y-%m-%d at %H:%M:%S %Z')" >> changelog.md
          echo "" >> changelog.md
          echo "**Build info**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> changelog.md
          echo "" >> changelog.md
          echo ":white_check_mark: This version is ready for PocketMine-MP 5 production servers." >> changelog.md

      - name: Update latest branch release
        uses: ncipollo/release-action@v1.13.0
        with:
          artifacts: |
            ${{ github.workspace }}/Linux-PM5/*.tar.gz
          makeLatest: ${{ github.ref_name == github.event.repository.default_branch }}
          name: PHP ${{ steps.version.outputs.PHP_VERSION }} - Latest (Build ${{ github.run_number }})
          tag: php-${{ steps.version.outputs.PHP_VERSION }}-latest
          commit: ${{ github.sha }}
          allowUpdates: true
          bodyFile: ${{ github.workspace }}/changelog.md
          removeArtifacts: true
          prerelease: false

      - name: Publish unique release
        uses: ncipollo/release-action@v1.13.0
        with:
          artifacts: |
            ${{ github.workspace }}/Linux-PM5/*.tar.gz
          makeLatest: false
          name: PHP ${{ steps.version.outputs.PHP_VERSION }} - Build ${{ github.run_number }}
          tag: php-${{ steps.version.outputs.PHP_VERSION }}-build-${{ github.run_number }}
          commit: ${{ github.sha }}
          bodyFile: ${{ github.workspace }}/changelog.md
          prerelease: false
